<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Wif'in Macerası</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#ffd1dc; touch-action:manipulation; }
canvas { display:block; position:absolute; top:0; left:0; z-index:1; pointer-events:none; }

#menu, #transition, #ending {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:10;
  pointer-events:none;
}
#menu.active, #transition.active, #ending.active { pointer-events:auto; }

#menu { background:transparent; position:fixed; z-index:999; }
#menu h1 { font-family:'Segoe UI',sans-serif; font-size:clamp(24px,5vw,42px); color:#d6336c; text-shadow:2px 2px 0 #ffe0e8; margin-bottom:6px; }
#menu .subtitle { font-size:clamp(13px,2.5vw,18px); color:#e64980; margin-bottom:24px; text-align:center; padding:0 20px; }
#menu .chars { display:flex; gap:16px; align-items:center; margin-bottom:28px; }
.char-circle { width:clamp(50px,10vw,80px); height:clamp(50px,10vw,80px); border-radius:50%; border:4px solid #ff85a2; box-shadow:0 4px 15px rgba(214,51,108,0.3); background:rgba(255,255,255,0.3); }
#menu .chars span { font-size:clamp(18px,3.5vw,28px); color:#e64980; }
.ctrl-hint { margin-top:20px; font-size:11px; color:#e64980; font-family:'Segoe UI',sans-serif; text-align:center; padding:0 20px; opacity:0.8; }
#menu .hearts { font-size:20px; animation:float 2s ease-in-out infinite; position:absolute; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }

.btn {
  background:#ff4d6d; color:#fff; border:3px solid #fff; padding:18px 60px; margin-top:10px;
  font-size:clamp(20px,4vw,26px); border-radius:50px; cursor:pointer;
  box-shadow:0 6px 20px rgba(214,51,108,0.35); transition:transform 0.15s;
  font-family:'Segoe UI',sans-serif; font-weight:700; letter-spacing:1px; text-shadow:0 2px 4px rgba(0,0,0,0.2);
}
.btn:hover { transform:scale(1.08); }
.btn:active { transform:scale(0.95); }

#transition {
  background:rgba(255,182,193,0.92); display:none;
}
#transition.active { display:flex; }
#transition .msg {
  font-family:'Segoe UI',sans-serif; font-size:clamp(20px,4vw,32px);
  color:#d6336c; text-align:center; padding:0 30px;
  background:#fff; border-radius:25px; padding:25px 35px;
  box-shadow:0 8px 30px rgba(214,51,108,0.3);
  max-width:90vw;
}

#ending {
  background:transparent; display:none; justify-content:flex-end; padding-bottom:30px;
}
#ending.active { display:flex; }
#ending h2 { font-size:clamp(24px,5vw,42px); color:#d6336c; margin-bottom:8px; text-shadow:0 0 20px rgba(255,255,255,0.8); }
#ending .love { font-size:clamp(18px,4vw,28px); color:#c9184a; margin-bottom:20px; text-shadow:0 0 20px rgba(255,255,255,0.8); }

#touch-controls {
  position:absolute; bottom:20px; left:0; right:0; display:flex;
  justify-content:space-between; padding:0 20px; z-index:20;
  pointer-events:none;
}
.touch-btn {
  width:clamp(48px,12vw,70px); height:clamp(48px,12vw,70px);
  border-radius:50%; background:rgba(255,133,162,0.35);
  border:2.5px solid rgba(255,133,162,0.5); color:#fff;
  font-size:clamp(20px,5vw,32px); display:flex; align-items:center;
  justify-content:center; pointer-events:auto; user-select:none;
  -webkit-user-select:none; touch-action:manipulation;
}
.touch-btn:active { background:rgba(255,133,162,0.65); }
.touch-spacer { width:clamp(48px,12vw,70px); }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="menu" class="active">
  <button class="btn" id="btn-start">✨ Başla ✨</button>
  <p class="ctrl-hint">🎮 Klavye: Ok Tuşları / WASD &nbsp;|&nbsp; 📱 Mobil: Alttaki butonlar</p>
</div>

<button id="btn-mute" onclick="toggleMute()"
  style="position:absolute;top:12px;right:12px;background:rgba(255,133,162,0.3);border:2px solid #ff85a2;color:#d6336c;
  width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;z-index:1000;pointer-events:auto;">🔊</button>

<div id="transition">
  <div class="msg" id="transition-msg"></div>
</div>

<div id="ending">
  <button class="btn" onclick="restartBossFight()">Tekrar Oyna</button>
</div>

<div id="touch-controls">
  <button class="touch-btn" id="btn-left">◀</button>
  <button class="touch-btn" id="btn-up">▲</button>
  <button class="touch-btn" id="btn-right">▶</button>
</div>

<script>
// ─── AUDIO ENGINE ────────────────────────────
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e) { console.log('Audio not available'); }
}

function playTone(freq, type, duration, vol=0.15, glideTo=null) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(freq, t);
  if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t + duration);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t); osc.stop(t + duration);
}

function sfxJump() { playTone(350, 'square', 0.12, 0.12, 700); }
function sfxPop() { playTone(600, 'sine', 0.08, 0.08, 200); }
function sfxDing() { playTone(880, 'sine', 0.3, 0.15); }
function sfxWin() {
  [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.4,0.18), i*120));
}
function sfxStep() { playTone(200, 'sine', 0.06, 0.04, 300); }

let musicInterval = null;
function startMusic() {
  if (!audioCtx || musicInterval) return;
  const notes = [523,659,784,659,523,587,659,523];
  let i = 0;
  musicInterval = setInterval(() => {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(notes[i%8], t);
    gain.gain.setValueAtTime(0.04, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    osc.start(t); osc.stop(t+0.35);
    i++;
  }, 420);
}

// ─── CANVAS ──────────────────────────────────
const canvas = document.getElementById('game');

// Fallback: if onload doesn't fire for data URIs
setTimeout(() => { if (imgsReady < 2) { imgsReady = 2; init(); } }, 1000);
const ctx = canvas.getContext('2d');
const W = 960, H = 540;
let scale = 1, offsetX = 0, offsetY = 0;

function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww/W, wh/H);
  canvas.width = ww; canvas.height = wh;
  offsetX = (ww - W*scale)/2;
  offsetY = (wh - H*scale)/2;
}
window.addEventListener('resize', resize);
resize();

// ─── INPUT ───────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; e.preventDefault(); });

let touchLeft=false, touchRight=false, touchJump=false;
const btnLeft = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');
const btnUp = document.getElementById('btn-up');

btnLeft.addEventListener('pointerdown', e => { e.preventDefault(); touchLeft=true; });
btnLeft.addEventListener('pointerup', e => { e.preventDefault(); touchLeft=false; });
btnLeft.addEventListener('pointerleave', e => { touchLeft=false; });
btnRight.addEventListener('pointerdown', e => { e.preventDefault(); touchRight=true; });
btnRight.addEventListener('pointerup', e => { e.preventDefault(); touchRight=false; });
btnRight.addEventListener('pointerleave', e => { touchRight=false; });
btnUp.addEventListener('pointerdown', e => { e.preventDefault(); touchJump=true; });
btnUp.addEventListener('pointerup', e => { e.preventDefault(); touchJump=false; });
btnUp.addEventListener('pointerleave', e => { touchJump=false; });

// Handle cancel on touch
btnLeft.addEventListener('touchcancel', e => { touchLeft=false; });
btnRight.addEventListener('touchcancel', e => { touchRight=false; });
btnUp.addEventListener('touchcancel', e => { touchJump=false; });

function hasTouch() { return 'ontouchstart' in window || navigator.maxTouchPoints > 0; }
function updateTouchControls() {
  const c = document.getElementById('touch-controls');
  c.style.display = hasTouch() ? 'flex' : 'none';
}
updateTouchControls();

// ─── COLLISION ───────────────────────────────
function rectsOverlap(a,b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function resolveCollisions() {
  const px = player.x, py = player.y, pw = player.w, ph = player.h;
  player.grounded = false;

  for (const p of level.platforms) {
    if (!rectsOverlap({x:px,y:py,w:pw,h:ph}, {x:p.x,y:p.y,w:p.w,h:p.h})) continue;

    const overlapLeft = (px+pw) - p.x;
    const overlapRight = (p.x+p.w) - px;
    const overlapTop = (py+ph) - p.y;
    const overlapBottom = (p.y+p.h) - py;

    const minX = Math.min(overlapLeft, overlapRight);
    const minY = Math.min(overlapTop, overlapBottom);

    if (minX < minY) {
      if (overlapLeft < overlapRight) {
        player.x = p.x - pw;
      } else {
        player.x = p.x + p.w;
      }
      player.vx = 0;
    } else {
      if (overlapTop < overlapBottom) {
        player.y = p.y - ph;
        player.vy = 0;
        player.grounded = true;
      } else {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }
}

// ─── PARTICLES ───────────────────────────────
function spawnHearts(x, y, count) {
  for (let i=0; i<count; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*3,
      vy: -(Math.random()*4+2),
      life: 1, decay: 0.008+Math.random()*0.02,
      size: 6+Math.random()*12,
      type: 'heart'
    });
  }
}

function spawnSparkles(x, y, count) {
  for (let i=0; i<count; i++) {
    particles.push({
      x: x+(Math.random()-0.5)*20, y: y+(Math.random()-0.5)*10,
      vx: (Math.random()-0.5)*1.5,
      vy: -(Math.random()*2+1),
      life: 1, decay: 0.02+Math.random()*0.04,
      size: 2+Math.random()*4,
      type: 'sparkle'
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawHeart(ctx, x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size/20, size/20);
  ctx.beginPath();
  ctx.moveTo(0, 4);
  ctx.bezierCurveTo(0, 0, -8, -3, -8, -8);
  ctx.bezierCurveTo(-8, -12, -4, -14, 0, -10);
  ctx.bezierCurveTo(4, -14, 8, -12, 8, -8);
  ctx.bezierCurveTo(8, -3, 0, 0, 0, 4);
  ctx.fill();
  ctx.restore();
}

function drawParticles(ctx, camX) {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    if (p.type === 'heart') {
      ctx.fillStyle = ['#ff4d6d','#ff6b8a','#ff85a2','#e64980'][Math.floor(Math.random()*4)];
      drawHeart(ctx, p.x-camX, p.y, p.size);
    } else {
      ctx.fillStyle = '#ffd1dc';
      ctx.beginPath();
      ctx.arc(p.x-camX, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ─── SPEECH BUBBLES ──────────────────────────
function addBubble(text) {
  bubbles.push({ text, life: 1, decay: 0.003 });
  if (bubbles.length > 3) bubbles.shift();
}

function updateBubbles() {
  for (const b of bubbles) b.life -= b.decay;
  bubbles = bubbles.filter(b => b.life > 0);
}

function drawBubbles(ctx, px, py, camX) {
  for (let i=0; i<bubbles.length; i++) {
    const b = bubbles[i];
    ctx.globalAlpha = b.life;
    const bx = px - camX - 30;
    const by = py - 40 - i*35;

    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#ffb6c1';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const bw = ctx.measureText(b.text).width + 20;
    const bh = 26;
    ctx.roundRect(bx-bw/2, by, bw, bh, 12);
    ctx.fill();
    ctx.stroke();

    // Little tail
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(bx-8, by+bh);
    ctx.lineTo(bx, by+bh+10);
    ctx.lineTo(bx+8, by+bh);
    ctx.fill();

    ctx.fillStyle = '#d6336c';
    ctx.font = '13px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.fillText(b.text, bx, by+18);
    ctx.textAlign = 'start';
  }
  ctx.globalAlpha = 1;
}

function drawBg() {

function drawClouds(camX) {

    const cx = x - camX*0.3;
    const cy = 40 + Math.sin(x*0.003)*25;
    ctx.beginPath();
    ctx.arc(cx, cy, 22, 0, Math.PI*2);
    ctx.arc(cx+20, cy-8, 18, 0, Math.PI*2);
    ctx.arc(cx+40, cy, 20, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawDecorations(camX) {
  for (const d of level.decorations) {
    const dx = d.x - camX;
    if (dx < -80 || dx > W+80) continue;

    if (d.type === 'tree') {
      ctx.fillStyle = '#795548';
      ctx.fillRect(dx-4, d.y+15, 8, 40);
      ctx.fillStyle = '#4caf50';
      ctx.beginPath(); ctx.arc(dx, d.y, 22, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#388e3c';
      ctx.beginPath(); ctx.arc(dx-6, d.y-5, 14, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx+8, d.y-3, 12, 0, Math.PI*2); ctx.fill();
    } else if (d.type === 'cloud') {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(dx, d.y, 20, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx+18, d.y-6, 16, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx-14, d.y-2, 14, 0, Math.PI*2); ctx.fill();
    } else if (d.type === 'building') {
      const bh = 40+Math.abs(Math.sin(d.x))*40;
      ctx.fillStyle = '#b0bec5';
      ctx.fillRect(dx-10, d.y-bh+20, 20, bh);
      ctx.fillStyle = '#eceff1';
      for (let wy=d.y-bh+28; wy<d.y+20; wy+=16) {
        ctx.fillRect(dx-3, wy, 6, 8);
      }
    } else if (d.type === 'palm') {
      ctx.fillStyle = '#8d6e63';
      ctx.fillRect(dx-3, d.y, 6, 50);
      ctx.fillStyle = '#66bb6a';
      ctx.beginPath(); ctx.arc(dx+14, d.y-4, 16, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx-10, d.y-8, 14, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx+2, d.y-14, 15, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawPlatforms(camX) {
  for (const p of level.platforms) {
    const px = p.x - camX;
    if (px < -p.w || px > W+p.w) continue;
    if (p.h > 20) {
      // Ground
      const grad = ctx.createLinearGradient(0,0,0,p.y);
      grad.addColorStop(0, '#8bc34a');
      grad.addColorStop(1, '#558b2f');
      ctx.fillStyle = grad;
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.fillStyle = '#7cb342';
      ctx.fillRect(px, p.y, p.w, 8);
    } else {
      // Platform
      ctx.fillStyle = '#a1887f';
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.fillStyle = '#bcaaa4';
      ctx.fillRect(px, p.y, p.w, 4);
    }
  }
}

function drawCharacter(img, x, y, w, h, facingRight, camX) {
  const sx = x - camX;
  ctx.save();
  ctx.beginPath();
  ctx.arc(sx+w/2, y+h/2, w/2, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(img, sx, y, w, h);
  ctx.restore();
}

function drawGokAt(x, y, camX) {
  const sx = x - camX;

  ctx.clip();
  ctx.drawImage(gokImg, sx, y, w, h);

function drawCinematic() {
  // Beach background
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#ffcc80');
  grad.addColorStop(0.5, '#ffab91');
  grad.addColorStop(1, '#ffe0b2');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Ground
  ctx.fillStyle = '#ffe0b2';
  ctx.fillRect(0, 400, W, 140);
  ctx.fillStyle = '#ffcc80';
  ctx.fillRect(0, 400, W, 6);

  // Camera centered on the scene
  const camX = level.goalX - W/2;
  
  // Wif on the left, Gokdeniz on the right - facing each other
  drawCharacter(wifImg, level.goalX - 200, level.groundY - 44, 36, 44, true, camX);
  drawGokAt(level.goalX, gokBossY, camX);

  // Speech bubbles based on cinematic timer
  const gx = level.goalX - camX;
  const gy = gokBossY - 40;
  
  if (cinematicTimer > 180) {
    // First 3 seconds: "tubaleti ariyodum yaw"
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#64b5f6';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.roundRect(gx-90, gy-30, 180, 30, 12);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#1565c0';
    ctx.font = 'bold 14px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.fillText('tubaleti ariyodum yaw', gx, gy-8);
    ctx.textAlign = 'start';
  } else {
    // Last 3 seconds: "TUTAMUYORUMMM!"
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#ef5350';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    // Shake effect
    const shake = Math.sin(Date.now()*0.05)*3;
    ctx.roundRect(gx-85 + shake, gy-30 + shake, 170, 30, 12);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#c62828';
    ctx.font = 'bold 16px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.fillText('TUTAMUYORUMMM!', gx + shake, gy-8 + shake);
    ctx.textAlign = 'start';
    
    // Gökdeniz shaking
    const gshake = Math.sin(Date.now()*0.08)*4;
    drawGokAt(level.goalX + gshake, gokBossY + gshake, camX);
  }
}

function drawBossFight() {
  var grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#ffcc80');
  grad.addColorStop(0.5, '#ffab91');
  grad.addColorStop(1, '#ffe0b2');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#ffe0b2';
  ctx.fillRect(0, 400, W, 140);
  ctx.fillStyle = '#ffcc80';
  ctx.fillRect(0, 400, W, 6);

  var camX = level.goalX - W + 120;
  
  // Platforms
  for (var pi = 0; pi < level.platforms.length; pi++) {
    var p = level.platforms[pi];
    var px = p.x - camX;
    if (px < -p.w || px > W+p.w) continue;
    if (p.h > 20) { ctx.fillStyle = '#ffcc80'; ctx.fillRect(px, p.y, p.w, p.h); }
    else { ctx.fillStyle = '#8d6e63'; ctx.fillRect(px, p.y, p.w, p.h); ctx.fillStyle = '#bcaaa4'; ctx.fillRect(px, p.y, p.w, 4); }
  }

  // Gokdeniz moving
  drawGokAt(level.goalX, gokBossY, camX);

  // Projectiles
  for (var pj = 0; pj < projectiles.length; pj++) {
    var proj = projectiles[pj];
    var ppx = proj.x - camX;
    if (ppx < -20 || ppx > W+20) continue;
    ctx.fillStyle = '#8d6e63';
    ctx.beginPath(); ctx.arc(ppx, proj.y, proj.size, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6d4c41';
    ctx.beginPath(); ctx.arc(ppx-2, proj.y-2, proj.size*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(ppx-2, proj.y-3, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ppx+3, proj.y-3, 1, 0, Math.PI*2); ctx.fill();
  }

  // Wif
  drawCharacter(wifImg, player.x, player.y, player.w, player.h, player.facingRight, camX);

  // UI
  var secLeft = Math.ceil(bossTimer / 60);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(W/2-100, 10, 200, 32);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px "Segoe UI"';
  ctx.textAlign = 'center';
  var livesLeft = 3 - bossHits;
  var heartsStr = '';
  for (var hi=0; hi<livesLeft; hi++) heartsStr += '❤';
  for (var hi=0; hi<bossHits; hi++) heartsStr += '὚4';
  ctx.fillText('KAC! ' + secLeft + 's  ' + heartsStr, W/2, 33);
  ctx.textAlign = 'start';

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px "Segoe UI"';
  ctx.textAlign = 'left';
  ctx.fillText('❤ ' + heartsCollected, 24, 36);
  ctx.textAlign = 'start';

  drawParticles(ctx, camX);
}

    grad.addColorStop(1, '#ffc0cb');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // Floating hearts everywhere
    var t = Date.now()*0.001;
    for (var i=0; i<25; i++) {
      var hx = (i*83 + t*15) % W;
      var hy = (i*57 + Math.sin(t+i)*40 + H*0.3) % H;
      ctx.globalAlpha = 0.35 + Math.sin(t*2+i)*0.15;
      ctx.fillStyle = ['#ff4d6d','#ff85a2','#e64980','#ffb6c1'][i%4];
      drawHeart(ctx, hx, hy, 6+Math.sin(t*1.5+i)*3);
    }
    ctx.globalAlpha = 1;

    var subPhase = elapsed - 360;

    if (subPhase < 200) {
      // "seni cok seviyorum askimmm"
      var alpha = Math.min(1, subPhase / 40);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#ff85a2'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.roundRect(cx-130, H/2-20, 260, 40, 18);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#d6336c';
      ctx.font = 'bold 18px "Segoe UI"';
      ctx.textAlign = 'center';
      ctx.fillText('seni cok seviyorum askimmm', cx, H/2+7);
      ctx.textAlign = 'start';
      ctx.globalAlpha = 1;
    } else if (subPhase < 400) {
      // Big heart + "SENI COK SEVIYORUM"
      var alpha2 = Math.min(1, (subPhase-200) / 40);
      ctx.globalAlpha = alpha2;
      
      var pulse = 1 + Math.sin(Date.now()*0.004)*0.12;
      ctx.fillStyle = '#ff4d6d';
      drawHeart(ctx, cx, H/2-30, 50 * pulse);

      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#ff4d6d'; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(cx-165, H/2+30, 330, 42, 20);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#d6336c';
      ctx.font = 'bold 24px "Segoe UI"';
      ctx.textAlign = 'center';
      ctx.fillText('SENI COK SEVIYORUM', cx, H/2+60);
      ctx.textAlign = 'start';
      ctx.globalAlpha = 1;
    } else {
      // "bazen mal olabiliyorum dovme beni"
      var alpha3 = Math.min(1, (subPhase-400) / 40);
      ctx.globalAlpha = alpha3;

      ctx.fillStyle = '#ff4d6d';
      ctx.globalAlpha = alpha3 * 0.6;
      drawHeart(ctx, cx, H/2-60, 40);

      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#ffb6c1'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.roundRect(cx-160, H/2-20, 320, 38, 18);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#e64980';
      ctx.font = 'bold 16px "Segoe UI"';
      ctx.textAlign = 'center';
      ctx.fillText('bazen mal olabiliyorum dovme beni', cx, H/2+7);
      ctx.textAlign = 'start';
      ctx.globalAlpha = 1;
    }

    // Bottom hearts
    for (var i=0; i<10; i++) {
      ctx.fillStyle = ['#ff4d6d','#ff85a2','#e64980'][i%3];
      ctx.globalAlpha = 0.5+Math.sin(Date.now()*0.003+i)*0.3;
      drawHeart(ctx, cx-120+i*26, 480+Math.sin(Date.now()*0.002+i)*5, 8+Math.sin(i)*3);
    }
    ctx.globalAlpha = 1;

    // Tiny text at bottom
    ctx.fillStyle = '#d6336c';
    ctx.font = '14px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.fillText('Mal Kocam  Seni seviyorum', cx, 510);
    ctx.textAlign = 'start';

    return;
  }

  // === FIGHT RESULT SCREEN (0-6s) ===
  var grad = ctx.createLinearGradient(0,0,0,H);
  if (won) {
    grad.addColorStop(0, '#ffcc80');
    grad.addColorStop(0.5, '#ffab91');
    grad.addColorStop(1, '#ffe0b2');
  } else {
    grad.addColorStop(0, '#cfd8dc');
    grad.addColorStop(0.5, '#b0bec5');
    grad.addColorStop(1, '#90a4ae');
  }
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  ctx.fillStyle = won ? '#ffe0b2' : '#cfd8dc';
  ctx.fillRect(0, 400, W, 140);
  ctx.fillStyle = won ? '#ffcc80' : '#b0bec5';
  ctx.fillRect(0, 400, W, 6);

  var cy = 365, bob = Math.sin(Date.now()*0.003)*3;

  drawGokAtEnd(cx-35, cy+bob);
  if (won) {
    drawWifAtEnd(cx+5, cy+bob);
    ctx.fillStyle = '#ff4d6d';
    ctx.globalAlpha = 0.7;
    drawHeart(ctx, cx-10, cy-55+Math.sin(Date.now()*0.005)*8, 36);
    ctx.globalAlpha = 1;
  } else {
    drawWifAtEnd(cx+55, cy+15+bob);
  }

  if (elapsed < 360) {
    var bx = won ? cx + 50 : cx;
    var by = cy - 85;
    var msg = won ? 'boklu ezik koydum muahah' : 'bokladim seni ezik';
    var bcolor = won ? '#ff85a2' : '#64b5f6';
    var tcolor = won ? '#d6336c' : '#1565c0';

    ctx.fillStyle = '#fff';
    ctx.strokeStyle = bcolor; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.roundRect(bx-85, by, 170, 30, 14);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = tcolor;
    ctx.font = 'bold 14px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.fillText(msg, bx, by+21);
    ctx.textAlign = 'start';

    if (won) {
      // Only "bokum gotumde kaldi" - no tubaleti here
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#64b5f6'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(cx-80, cy-45, 160, 26, 12);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#1565c0';
      ctx.font = '12px "Segoe UI"';
      ctx.textAlign = 'center';
      ctx.fillText('bokum gotumde kaldi', cx, cy-27);
      ctx.textAlign = 'start';
    }
  }

  for (var i=0; i<5; i++) {
    ctx.fillStyle = ['#ff4d6d','#ff85a2','#e64980'][i%3];
    ctx.globalAlpha = 0.4+Math.sin(Date.now()*0.003+i)*0.3;
    drawHeart(ctx, cx-70+i*35, 430+Math.sin(Date.now()*0.002+i)*5, 9+Math.sin(i)*4);
  }
  ctx.globalAlpha = 1;
  drawParticles(ctx, 0);
}

function drawGokAtEnd(x, y) {
  const w=42, h=50;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(x+w/2, y+h+2, w/2, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#81d4fa';
  ctx.beginPath(); ctx.roundRect(x+6, y+h-6, w-12, 14, 6); ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.arc(x+w/2, y+h/2-4, w/2-1, 0, Math.PI*2); ctx.clip();
  ctx.drawImage(gokImg, x-1, y-5, w+2, h+2);
  ctx.restore();

  ctx.restore();
}

function drawWifAtEnd(x, y) {
  const w=36, h=44;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(x+w/2, y+h+2, w/2, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffb6c1';
  ctx.beginPath(); ctx.roundRect(x+6, y+h-8, w-12, 16, 6); ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.arc(x+w/2, y+h/2-4, w/2, 0, Math.PI*2); ctx.clip();
  ctx.drawImage(wifImg, x, y-4, w, h);
  ctx.restore();

  ctx.restore();
}

// ─── GAME LOOP ──────────────────────────────
function update() {
  if (state === 'transition') {
    transitionTimer--;
    if (transitionTimer <= 0) {
      document.getElementById('transition').classList.remove('active');
      if (levelIdx >= 3) {
        state = 'ending';
        endingTimer = 180;
        document.getElementById('ending').classList.add('active');
        sfxWin();
        spawnHearts(W/2, H/2, 40);
      } else {
        loadLevel(levelIdx+1);
        state = 'playing';
      }
    }
    updateParticles();
    return;
  }

  if (state === 'cinematic') {
    cinematicTimer--;
    // Freeze player
    player.vx = 0;
    // Gökdeniz bobbing
    gokBossY = level.groundY - 56 + Math.sin(Date.now()*0.003)*5;
    
    if (cinematicTimer <= 0) {
      // Start boss fight
      state = 'bossfight';
      player.x = level.goalX - 380;
      player.y = 300;
      player.vx = 0;
      player.vy = 0;
      bossTimer = 1800;
      // 4 well-spaced platforms
      level.platforms.push({x:level.goalX-350, y:340, w:120, h:14});
      level.platforms.push({x:level.goalX-220, y:260, w:120, h:14});
      level.platforms.push({x:level.goalX-350, y:200, w:120, h:14});
      level.platforms.push({x:level.goalX-220, y:130, w:120, h:14});
    }
    return;
  }

  if (state === 'bossfight') {
    bossTimer--;
    gokBossY = level.groundY - 56 + Math.sin(Date.now()*0.004) * 150;

    if (bossTimer % 75 === 0 && bossTimer > 60) {
      const gx = level.goalX - 20;
      const heights = [80, 150, 220, gokBossY, level.groundY-30];
      const h = heights[Math.floor(Math.random()*5)];
      projectiles.push({x:gx, y:h, vx:-2.5-Math.random()*1.5, vy:0, size:8+Math.random()*6});
    }
    for (const proj of projectiles) proj.x += proj.vx;
    projectiles = projectiles.filter(p => p.x > -50);

    for (const proj of projectiles) {
      if (rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h},{x:proj.x-8,y:proj.y-8,w:16,h:16})) {
        bossHits++;
        player.vx = (player.x < proj.x ? -7 : 7);
        player.vy = -5;
        spawnSparkles(player.x+player.w/2, player.y+player.h/2, 10);
        proj.x = -100;
        if (bossHits >= 3) { bossResult = 'lose'; bossTimer = 0; }
      }
    }

    const left = keys['ArrowLeft'] || keys['a'] || keys['A'] || touchLeft;
    const right = keys['ArrowRight'] || keys['d'] || keys['D'] || touchRight;
    const jump = keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' '] || touchJump;
    if (left) { player.vx = -3; player.facingRight = false; }
    else if (right) { player.vx = 3; player.facingRight = true; }
    else { player.vx *= 0.85; if (Math.abs(player.vx)<0.1) player.vx=0; }

    if (jump && !keys._jumpConsumed) {
      keys._jumpConsumed = true;
      if (player.grounded || player.jumpsLeft > 0) {
        if (!player.grounded) player.jumpsLeft--;
        player.vy = -7.5; player.grounded = false; sfxJump();
      }
    }
    if (!jump) keys._jumpConsumed = false;
    if (player.grounded) player.jumpsLeft = 2;

    player.vy += 0.22;
    if (player.vy > 8) player.vy = 8;
    player.x += player.vx;
    player.y += player.vy;
    if (player.x < level.goalX - 500) player.x = level.goalX - 500;
    if (player.x > level.goalX + 100) player.x = level.goalX + 100;
    if (player.y > H+100) { player.x = level.goalX-300; player.y = 300; player.vx=0; player.vy=0; }
    resolveCollisions();

    if (bossTimer <= 0) {
      if (bossResult === '') bossResult = 'win';
      state = 'ending';
      endingTimer = 900;
      document.getElementById('ending').classList.add('active');
      if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
      sfxWin();
      spawnHearts(W/2, H/2, 40);
    }
    updateParticles();
    return;
  }

  if (state === 'ending') {
    endingTimer--;
    updateParticles();
    if (endingTimer % 20 === 0 && endingTimer > 0) {
      spawnHearts(W/2 + Math.random()*160-80, H*0.5 + Math.random()*60-30, 10);
    }
    return;
  }

  if (state !== 'playing') return;

  // Input
  const left = keys['ArrowLeft'] || keys['a'] || keys['A'] || touchLeft;
  const right = keys['ArrowRight'] || keys['d'] || keys['D'] || touchRight;
  const jump = keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' '] || touchJump;

  // Movement
  const speed = 3.0;
  if (left) { player.vx = -speed; player.facingRight = false; }
  else if (right) { player.vx = speed; player.facingRight = true; }
  else { player.vx *= 0.8; if (Math.abs(player.vx)<0.1) player.vx=0; }

  // Jumping with double jump
  if (jump && !keys._jumpConsumed) {
    keys._jumpConsumed = true;
    if (player.grounded || player.jumpsLeft > 0) {
      if (!player.grounded) player.jumpsLeft--;
      player.vy = -7;
      player.grounded = false;
      sfxJump();
      spawnSparkles(player.x+player.w/2, player.y+player.h, 6);
    }
  }
  if (!jump) keys._jumpConsumed = false;
  if (player.grounded) player.jumpsLeft = 2;

  // Physics
  player.vy += 0.22;
  if (player.vy > 8) player.vy = 8;
  player.x += player.vx;
  player.y += player.vy;

  // Clamp to level bounds
  if (player.x < -200) player.x = -200;
  if (player.x > level.goalX + 200) player.x = level.goalX + 200;

  // Fall off bottom -> reset
  if (player.y > H+100) {
    player.x = level.playerStart.x;
    player.y = level.playerStart.y;
    player.vx = 0; player.vy = 0;
  }

  resolveCollisions();

  // Heart pickup collection
  if (level.pickups) {
    for (const p of level.pickups) {
      if (!p.collected && rectsOverlap(
        {x:player.x, y:player.y, w:player.w, h:player.h},
        {x:p.x-10, y:p.y-10, w:20, h:20}
      )) {
        p.collected = true;
        heartsCollected++;
        spawnSparkles(p.x, p.y, 8);
        sfxDing();
      }
    }
  }

  // Step sound
  if (player.grounded && Math.abs(player.vx) > 0.5) {
    stepTimer++;
    if (stepTimer > 14) { sfxStep(); stepTimer = 0; }
  }

  // Landing
  if (player.grounded && !wasGrounded) {
    spawnSparkles(player.x+player.w/2, player.y+player.h, 4);
  }
  wasGrounded = player.grounded;

  // Speech bubbles - progress-based triggers
  const bubbleTriggers = [0.1, 0.3, 0.5, 0.7, 0.9]; // % of level
  const progressKey = levelIdx + '_' + Math.floor(player.x / level.goalX * 10);
  for (let i = 0; i < bubbleTriggers.length; i++) {
    const triggerX = level.goalX * bubbleTriggers[i];
    if (!player._bubblesShown) player._bubblesShown = {};
    const key = levelIdx + '_' + i;
    if (!player._bubblesShown[key] && player.x > triggerX) {
      player._bubblesShown[key] = true;
      const msgs = levelMessages[levelIdx];
      addBubble(msgs[i % msgs.length]);
      sfxPop();
    }
  }
  updateBubbles();

  // Particles
  updateParticles();

  // Check goal (only level 4) - trigger cinematic
  if (levelIdx === 3 && state === 'playing' && player.x > level.goalX - 50) {
    state = 'cinematic';
    cinematicTimer = 360;
    gokBossY = level.groundY - 56;
    projectiles = [];
    bossHits = 0;
    bossResult = '';
    player.vx = 0;
    player.vy = 0;
    document.getElementById('touch-controls').style.display = 'none';
  }

  // Level end (levels 0-2)
  if (levelIdx < 3 && player.x > level.goalX - 30) {
    state = 'transition';
    transitionTimer = 90;
    document.getElementById('transition').classList.add('active');
    document.getElementById('transition-msg').textContent = transitionMessages[levelIdx];
    sfxDing();
  }

  // Camera
  camera.x += (player.x - W/2 - camera.x) * 0.1;
  camera.y += (player.y - H/2 - camera.y) * 0.1;
  camera.x = Math.max(0, Math.min(camera.x, level.goalX + 300 - W));
}

function draw() {
  ctx.clearRect(0,0,W,H);

  if (state === 'menu') {
    drawMenuBg();
    return;
  }

  if (state === 'cinematic') {
    drawCinematic();
    return;
  }

  if (state === 'bossfight') {
    drawBossFight();
    return;
  }

  if (state === 'ending') {
    drawEndingScene();
    return;
  }

  const camX = camera.x;
  drawBg();
  drawClouds(camX);

  // Draw sun for level 3
  if (levelIdx === 3) {
    const sunX = W - 100;
    const grad = ctx.createRadialGradient(sunX, 80, 10, sunX, 80, 70);
    grad.addColorStop(0, '#fff9c4');
    grad.addColorStop(0.4, '#ffcc80');
    grad.addColorStop(1, 'rgba(255,183,77,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(sunX, 80, 70, 0, Math.PI*2); ctx.fill();
  }

  drawDecorations(camX);
  drawPlatforms(camX);

  // Draw heart pickups
  if (level.pickups) {
    const t = Date.now()*0.001;
    for (const p of level.pickups) {
      if (p.collected) continue;
      const px = p.x - camX;
      if (px < -20 || px > W+20) continue;
      const bob = Math.sin(t*3 + p.x*0.01)*3;
      ctx.fillStyle = '#ff4d6d';
      ctx.globalAlpha = 0.8;
      drawHeart(ctx, px, p.y + bob, 17);
      ctx.globalAlpha = 1;
    }
  }

  // Gökdeniz (only in level 4, only during playing state)
  if (levelIdx === 3 && state === 'playing') {
    const gx = level.goalX;
    const gy = level.groundY - 56;
    const bob = Math.sin(Date.now()*0.003)*5;
    drawGokAt(gx, gy + bob, camX);
  }

  // Wif
  drawCharacter(wifImg, player.x, player.y, player.w, player.h, player.facingRight, camX);
  drawBubbles(ctx, player.x+player.w/2, player.y, camX);
  drawParticles(ctx, camX);

  // Progress bar
  const progress = Math.min(player.x / level.goalX, 1);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(20, 12, W-40, 8);
  ctx.fillStyle = '#ff85a2';
  ctx.fillRect(20, 12, (W-40)*progress, 8);

  // Heart counter
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px "Segoe UI"';
  ctx.textAlign = 'left';
  ctx.fillText('❤ ' + heartsCollected, 24, 36);
  ctx.textAlign = 'start';

  // Level indicator
  ctx.fillStyle = '#fff';
  ctx.font = '12px "Segoe UI"';
  ctx.textAlign = 'right';
  const names = ['Yeşil Orman', 'Bulutlu Gökyüzü', 'Şehir', 'Gün Batımı Plajı'];
  ctx.fillText(`Bölüm ${levelIdx+1}/4 - ${names[levelIdx]}`, W-20, 38);
  ctx.textAlign = 'start';
}

function drawMenuBg() {
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#ffd1dc');
  grad.addColorStop(1, '#ffb6c1');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Draw character photos
  const cy = H*0.35;
  const r = 40;
  // Wif photo (left)
  ctx.save();
  ctx.beginPath(); ctx.arc(W/2-55, cy, r, 0, Math.PI*2); ctx.clip();
  ctx.drawImage(wifImg, W/2-55-r, cy-r, r*2, r*2);
  ctx.restore();


  // Gok photo (right)
  ctx.save();
  ctx.beginPath(); ctx.arc(W/2+55, cy, r, 0, Math.PI*2); ctx.clip();
  ctx.drawImage(gokImg, W/2+55-r, cy-r, r*2, r*2);
  ctx.restore();


  // Title text
  ctx.fillStyle = '#d6336c';
  ctx.font = 'bold 42px "Segoe UI"';
  ctx.textAlign = 'center';
  ctx.fillText('Wifin Macerasi', W/2, H*0.14);
  ctx.font = '17px "Segoe UI"';
  ctx.fillStyle = '#e64980';
  ctx.fillText('Mal Kocami Bulmam Lazim!', W/2, H*0.22);
  ctx.textAlign = 'start';

  // Heart between them
  ctx.fillStyle = '#e64980';
  drawHeart(ctx, W/2, cy-5, 24);

  // Animated hearts
  const t = Date.now()*0.001;
  for (let i=0; i<15; i++) {
    const hx = (i*67 + t*20)%W;
    const hy = (i*43 + Math.sin(t+i)*30 + H*0.4)%H;
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#ff85a2';
    drawHeart(ctx, hx, hy, 8+Math.sin(t+i)*4);
  }
  ctx.globalAlpha = 1;
}

// ─── GAME LOOP ───────────────────────────────
function gameLoop() {
  update();
  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);
  draw();
  ctx.restore();
  requestAnimationFrame(gameLoop);
}

// ─── INIT ────────────────────────────────────
function init() {
  loadLevel(0);
  resize();
  gameLoop();
}

let muted = false;
function toggleMute() {
  muted = !muted;
  const btn = document.getElementById('btn-mute');
  btn.textContent = muted ? '🔇' : '🔊';
  if (audioCtx) {
    if (muted) { audioCtx.suspend(); if (musicInterval) { clearInterval(musicInterval); musicInterval = null; } }
    else { audioCtx.resume(); startMusic(); }
  }
}

document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('btn-start');
  if (btn) { btn.addEventListener('click', startGame); }
});

function restartBossFight() {
  document.getElementById('ending').classList.remove('active');
  document.getElementById('menu').classList.remove('active');
  document.getElementById('menu').style.display = 'none';
  loadLevel(3);
  state = 'playing';
  document.getElementById('touch-controls').style.display = hasTouch() ? 'flex' : 'none';
  if (!muted && !musicInterval) startMusic();
}

function startGame() {
  initAudio();
  if (!muted) startMusic();
  loadLevel(0);
  state = 'playing';
  var menu = document.getElementById('menu');
  menu.classList.remove('active');
  menu.style.display = 'none';
  document.getElementById('touch-controls').style.display = hasTouch() ? 'flex' : 'none';
}

// Handle roundRect polyfill
if (!ctx.roundRect) {
  ctx.roundRect = function(x,y,w,h,r) {
    if (typeof r === 'number') r = {tl:r,tr:r,br:r,bl:r};
    ctx.beginPath();
    ctx.moveTo(x+r.tl, y);
    ctx.lineTo(x+w-r.tr, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r.tr);
    ctx.lineTo(x+w, y+h-r.br);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r.br, y+h);
    ctx.lineTo(x+r.bl, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r.bl);
    ctx.lineTo(x, y+r.tl);
    ctx.quadraticCurveTo(x, y, x+r.tl, y);
    ctx.closePath();
  };
}
</script>
